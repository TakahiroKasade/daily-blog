<!DOCTYPE html>
<th:block th:replace="~{fragments/navbar :: navbar}"></th:block>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的數位足跡 - DAILY_CODING</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-dark text-white">
<div class="container mt-5 pt-5">
    <div class="row mb-4">
        <div class="col-12">
            <h2><i class="fas fa-shoe-prints me-2"></i>我的數位足跡</h2>
            <p class="text-secondary">查看您在系統中的活動記錄與貢獻分析。</p>
        </div>
    </div>

    <!-- 數據圖表區 -->
    <div class="row">
        <div class="col-md-7 mb-4">
            <div class="card bg-secondary border-0 shadow-sm h-100">
                <div class="card-header bg-transparent border-bottom border-dark">
                    <h5 class="card-title mb-0">最近 7 天活動趨勢</h5>
                </div>
                <div class="card-body">
                    <canvas id="userActivityChart" height="250"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-5 mb-4">
            <div class="card bg-secondary border-0 shadow-sm h-100">
                <div class="card-header bg-transparent border-bottom border-dark">
                    <h5 class="card-title mb-0">操作功能分佈</h5>
                </div>
                <div class="card-body">
                    <canvas id="userDistributionChart" height="250"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- 詳細列表紀錄 -->
    <div class="row">
        <div class="col-12">
            <div class="card bg-secondary border-0 shadow-sm">
                <div class="card-header bg-transparent border-bottom border-dark">
                    <h5 class="card-title mb-0">最近 10 筆操作紀錄</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-dark table-hover mb-0">
                            <thead>
                            <tr>
                                <th>時間</th>
                                <th>動作</th>
                                <th>方法</th>
                                <th>狀態</th>
                                <th>耗時</th>
                            </tr>
                            </thead>
                            <tbody id="logTableBody">
                            <tr>
                                <td colspan="5" class="text-center py-4">數據讀取中...</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        fetch('/admin/api/stats/user')
            .then(response => response.json())
            .then(data => {
                renderActivityChart(data.activity);
                renderDistributionChart(data.distribution);
                renderLogTable(data.recentLogs);
            })
            .catch(error => console.error('Error fetching user stats:', error));
    });

    function renderActivityChart(activityData) {
        const labels = activityData.map(item => item.date);
        const values = activityData.map(item => item.count);

        new Chart(document.getElementById('userActivityChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '操作次數',
                    data: values,
                    borderColor: '#20c997',
                    backgroundColor: 'rgba(32, 201, 151, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, grid: { color: '#444' }, ticks: { color: '#fff' } },
                    x: { grid: { color: '#444' }, ticks: { color: '#fff' } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function renderDistributionChart(distData) {
        const labels = distData.map(item => item.label);
        const values = distData.map(item => item.value);

        new Chart(document.getElementById('userDistributionChart'), {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: ['#fd7e14', '#0dcaf0', '#6610f2', '#e83e8c', '#ffc107'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#fff', boxWidth: 12 } }
                }
            }
        });
    }

    function renderLogTable(logs) {
        const tbody = document.getElementById('logTableBody');
        if (logs.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">目前尚無操作紀錄</td></tr>';
            return;
        }

        tbody.innerHTML = logs.map(log => `
            <tr>
                <td>${new Date(log.createdAt).toLocaleString()}</td>
                <td><span class="badge bg-info text-dark">${log.operation}</span></td>
                <td class="text-truncate" style="max-width: 200px;">${log.method}</td>
                <td>
                    <span class="badge ${log.status === 'SUCCESS' ? 'bg-success' : 'bg-danger'}">
                        ${log.status}
                    </span>
                </td>
                <td>${log.executionTime}ms</td>
            </tr>
        `).join('');
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
