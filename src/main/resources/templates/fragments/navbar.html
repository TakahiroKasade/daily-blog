<!-- 共用導覽列片段 (Navbar Fragment) -->
<!-- 用法：<nav th:replace="~{fragments/navbar :: navbar}"></nav> -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark fixed-top"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="fas fa-code me-2"></i>DAILY_CODING</a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a href="/" class="nav-link text-white"><i class="fas fa-home me-1"></i> Home</a>
                </li>
                <li class="nav-item">
                     <a href="/resume" class="nav-link text-white"><i class="fas fa-briefcase me-1"></i> Resume</a>
                </li>
                <li class="nav-item">
                    <a href="/projects" class="nav-link text-white"><i class="fas fa-project-diagram me-1"></i> Projects</a>
                </li>
                <li class="nav-item">
                    <a href="https://github.com/TakahiroKasade" class="nav-link text-white" target="_blank"><i class="fab fa-github me-1"></i> GitHub</a>
                </li>
                
                <!-- 個人足跡入口 (所有登入者可見) -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a href="/activity" class="nav-link text-white">
                        <i class="fas fa-shoe-prints me-1"></i> My Activity
                    </a>
                </li>

                <!-- 管理員功能入口 -->
                <li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link dropdown-toggle text-warning" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-user-shield me-1"></i> ADMIN
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end" aria-labelledby="adminDropdown">
                        <li><a class="dropdown-item" href="/admin/users"><i class="fas fa-users me-2"></i>使用者管理</a></li>
                        <li><a class="dropdown-item" href="/admin/roles"><i class="fas fa-key me-2"></i>角色權限管理</a></li>
                        <li><hr class="dropdown-divider border-secondary"></li>
                        <li><a class="dropdown-item text-info" href="/admin/dashboard"><i class="fas fa-chart-line me-2"></i>系統儀表板</a></li>
                    </ul>
                </li>

                <!-- 身份操作 -->
                <li class="nav-item ms-lg-2 mt-2 mt-lg-0" sec:authorize="!isAuthenticated()">
                    <a href="/login" class="btn btn-sm btn-outline-success w-100">
                        <i class="fas fa-sign-in-alt me-1"></i> LOGIN
                    </a>
                </li>
                <li class="nav-item ms-lg-2 mt-2 mt-lg-0" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" id="logoutForm" class="d-none">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    </form>
                    <a href="javascript:document.getElementById('logoutForm').submit();" class="btn btn-sm btn-outline-danger w-100">
                        <i class="fas fa-sign-out-alt me-1"></i> LOGOUT
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
