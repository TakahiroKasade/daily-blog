<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daily Coding | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="fas fa-code"></i>
        </div>
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to Daily Coding</p>

        <div th:if="${param.locked}" class="alert alert-warning d-flex align-items-center" role="alert">
            <i class="fas fa-lock me-2"></i>
            Account is temporarily locked because there were too many failed login attempts. Please try again later.
        </div>

        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            Invalid username or password.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-user me-1"></i> Username
                </label>
                <input type="text" name="username" class="form-control auth-input"
                       placeholder="Enter your username" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">
                    <i class="fas fa-lock me-1"></i> Password
                </label>
                <input type="password" name="password" class="form-control auth-input"
                       placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 auth-btn">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>

        <div class="auth-footer">
            <span>Need an account?</span>
            <a href="/register" class="auth-link">Register</a>
        </div>
    </div>
</div>

</body>
</html>
