<!DOCTYPE html>
<th:block th:replace="~{fragments/navbar :: navbar}"></th:block>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>使用者管理 - 管理後台</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-dark text-white">
<div class="container mt-5 pt-5">
    <h2 class="mb-4"><i class="fas fa-users-cog me-2"></i>使用者管理</h2>

    <table class="table table-dark table-hover">
        <thead>
        <tr>
            <th>ID</th>
            <th>使用者名稱</th>
            <th>當前角色</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.username}"></td>
            <td>
                <span th:each="role : ${user.roles}" th:text="${role.name}" class="badge bg-primary me-1"></span>
            </td>
            <td>
                <button class="btn btn-sm btn-outline-info me-1" data-bs-toggle="modal" 
                        th:data-bs-target="'#editModal' + ${user.id}">
                    指派角色
                </button>
                <button class="btn btn-sm btn-outline-success" 
                        th:onclick="showUserFootprint([[${user.username}]])">
                    查看足跡
                </button>

                <!-- Role Assignment Modal -->
                <div class="modal fade" th:id="'editModal' + ${user.id}" tabindex="-1" aria-hidden="true">
                    <div class="modal-dialog">
                        <form th:action="@{/admin/users/roles}" method="post">
                            <div class="modal-content bg-dark">
                                <div class="modal-header border-secondary">
                                    <h5 class="modal-title">指派角色 - <span th:text="${user.username}"></span></h5>
                                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">
                                    <input type="hidden" name="userId" th:value="${user.id}">
                                    <div class="mb-3">
                                        <label class="form-label">選擇角色：</label>
                                        <div th:each="role : ${allRoles}" class="form-check">
                                            <input class="form-check-input" type="checkbox" name="roleIds" 
                                                   th:value="${role.id}" th:id="'role' + ${user.id} + '_' + ${role.id}"
                                                   th:checked="${user.roles.contains(role)}">
                                            <label class="form-check-label" th:for="'role' + ${user.id} + '_' + ${role.id}"
                                                   th:text="${role.name}"></label>
                                        </div>
                                    </div>
                                </div>
                                <div class="modal-footer border-secondary">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                    <button type="submit" class="btn btn-primary">儲存變更</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
    
    <!-- User Footprint Modal (Shared) -->
    <div class="modal fade" id="footprintModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="fas fa-history me-2"></i>行為稽核 - <span id="footprintUsername"></span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-7 mb-3">
                            <canvas id="modalActivityChart" height="200"></canvas>
                        </div>
                        <div class="col-md-5 mb-3">
                            <canvas id="modalDistributionChart" height="200"></canvas>
                        </div>
                    </div>
                    <div class="table-responsive mt-3">
                        <table class="table table-dark table-sm">
                            <thead>
                                <tr><th>時間</th><th>動作</th><th>狀態</th></tr>
                            </thead>
                            <tbody id="modalLogTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a href="/admin/roles" class="btn btn-outline-warning">管理角色與權限</a>
    </div>
</div>

<script th:inline="javascript">
    let activityChart, distChart;

    function showUserFootprint(username) {
        document.getElementById('footprintUsername').innerText = username;
        const modal = new bootstrap.Modal(document.getElementById('footprintModal'));
        modal.show();

        fetch(`/admin/api/stats/user?targetUser=${username}`)
            .then(res => res.json())
            .then(data => {
                renderModalCharts(data);
                renderModalTable(data.recentLogs);
            });
    }

    function renderModalCharts(data) {
        if (activityChart) activityChart.destroy();
        if (distChart) distChart.destroy();

        activityChart = new Chart(document.getElementById('modalActivityChart'), {
            type: 'line',
            data: {
                labels: data.activity.map(i => i.date),
                datasets: [{ label: '活躍度', data: data.activity.map(i => i.count), borderColor: '#20c997', fill: true }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });

        distChart = new Chart(document.getElementById('modalDistributionChart'), {
            type: 'doughnut',
            data: {
                labels: data.distribution.map(i => i.label),
                datasets: [{ data: data.distribution.map(i => i.value), backgroundColor: ['#fd7e14', '#0dcaf0', '#6610f2'] }]
            },
            options: { responsive: true }
        });
    }

    function renderModalTable(logs) {
        const tbody = document.getElementById('modalLogTable');
        tbody.innerHTML = logs.map(log => `
            <tr>
                <td>${new Date(log.createdAt).toLocaleTimeString()}</td>
                <td><span class="badge bg-info text-dark">${log.operation}</span></td>
                <td><span class="badge ${log.status === 'SUCCESS' ? 'bg-success' : 'bg-danger'}">${log.status}</span></td>
            </tr>
        `).join('');
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
