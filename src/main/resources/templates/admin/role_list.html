<!DOCTYPE html>
<th:block th:replace="~{fragments/navbar :: navbar}"></th:block>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>角色管理 - 管理後台</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
<div class="container mt-5 pt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-user-shield me-2"></i>角色管理</h2>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addRoleModal">新增角色</button>
    </div>

    <table class="table table-dark table-hover">
        <thead>
        <tr>
            <th>ID</th>
            <th>角色名稱</th>
            <th>擁有權限</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="role : ${roles}">
            <td th:text="${role.id}"></td>
            <td th:text="${role.name}"></td>
            <td>
                <span th:each="perm : ${role.permissions}" th:text="${perm.name}" class="badge bg-secondary me-1"></span>
            </td>
            <td>
                <button class="btn btn-sm btn-outline-info" data-bs-toggle="modal" 
                        th:data-bs-target="'#editRoleModal' + ${role.id}">
                    編輯
                </button>
                <a th:href="@{/admin/roles/delete/{id}(id=${role.id})}" 
                   class="btn btn-sm btn-outline-danger" 
                   onclick="return confirm('確定要刪除此角色嗎？')">刪除</a>

                <!-- Edit Role Modal -->
                <div class="modal fade" th:id="'editRoleModal' + ${role.id}" tabindex="-1" aria-hidden="true">
                    <div class="modal-dialog">
                        <form th:action="@{/admin/roles}" method="post">
                            <div class="modal-content bg-dark">
                                <div class="modal-header border-secondary">
                                    <h5 class="modal-title">編輯角色 - <span th:text="${role.name}"></span></h5>
                                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">
                                    <input type="hidden" name="roleId" th:value="${role.id}">
                                    <div class="mb-3">
                                        <label class="form-label">角色名稱</label>
                                        <input type="text" class="form-control bg-secondary text-white border-0" 
                                               name="name" th:value="${role.name}" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">分配權限：</label>
                                        <div th:each="perm : ${allPermissions}" class="form-check">
                                            <input class="form-check-input" type="checkbox" name="permissionIds" 
                                                   th:value="${perm.id}" th:id="'perm' + ${role.id} + '_' + ${perm.id}"
                                                   th:checked="${role.permissions.contains(perm)}">
                                            <label class="form-check-label" th:for="'perm' + ${role.id} + '_' + ${perm.id}"
                                                   th:text="${perm.name}"></label>
                                        </div>
                                    </div>
                                </div>
                                <div class="modal-footer border-secondary">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                    <button type="submit" class="btn btn-primary">儲存</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Add Role Modal -->
    <div class="modal fade" id="addRoleModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <form th:action="@{/admin/roles}" method="post">
                <div class="modal-content bg-dark">
                    <div class="modal-header border-secondary">
                        <h5 class="modal-title">新增角色</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">角色名稱</label>
                            <input type="text" class="form-control bg-secondary text-white border-0" 
                                   name="name" placeholder="例如：ROLE_EDITOR" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">分配權限：</label>
                            <div th:each="perm : ${allPermissions}" class="form-check">
                                <input class="form-check-input" type="checkbox" name="permissionIds" 
                                       th:value="${perm.id}" th:id="'addPerm' + ${perm.id}">
                                <label class="form-check-label" th:for="'addPerm' + ${perm.id}" th:text="${perm.name}"></label>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-secondary">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-success">建立</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
